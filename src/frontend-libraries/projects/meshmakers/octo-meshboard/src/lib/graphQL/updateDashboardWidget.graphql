mutation updateDashboardWidget($entities: [SystemUIDashboardWidgetInputUpdate]!) {
  runtime {
    systemUIDashboardWidgets {
      update(entities: $entities) {
        rtId
        ckTypeId
        name
        type
        col
        row
        colSpan
        rowSpan
        dataSourceType
        dataSourceCkTypeId
        dataSourceRtId
        config
        rtChangedDateTime
      }
    }
  }
}
