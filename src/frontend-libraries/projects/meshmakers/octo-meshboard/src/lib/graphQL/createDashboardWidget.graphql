mutation createDashboardWidget($entities: [SystemUIDashboardWidgetInput]!) {
  runtime {
    systemUIDashboardWidgets {
      create(entities: $entities) {
        rtId
        ckTypeId
        name
        type
        col
        row
        colSpan
        rowSpan
        dataSourceType
        dataSourceCkTypeId
        dataSourceRtId
        config
        rtCreationDateTime
      }
    }
  }
}
