<div class="markdown-widget"
     [class.loading]="isLoading()"
     [class.error]="error()"
     [ngStyle]="containerStyle()">
  @if (isNotConfigured()) {
    <mm-widget-not-configured
      message="No markdown content configured.">
    </mm-widget-not-configured>
  } @else {
    <div class="markdown-content mm-prose">
      <markdown [data]="resolvedContent()"></markdown>
    </div>
  }
</div>
