query getRuntimeEntityById($rtId: OctoObjectId!, $ckTypeId: String!) {
  runtime {
    runtimeEntities(ckId: $ckTypeId, rtId: $rtId) {
      items {
        rtId
        ckTypeId
        rtWellKnownName
        rtCreationDateTime
        rtChangedDateTime
        attributes(resolveEnumValuesToNames: true) {
          items {
            attributeName
            value
          }
        }
        associations {
          definitions(direction: ANY, first: 0) {
            totalCount
          }
        }
      }
    }
  }
}
