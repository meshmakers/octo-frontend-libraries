query executeRuntimeQuery($rtId: OctoObjectId!, $after: String, $first: Int) {
  runtime {
    runtimeQuery(rtId: $rtId) {
      items {
        queryRtId
        associatedCkTypeId
        columns {
          attributePath
          attributeValueType
        }
        rows(after: $after, first: $first) {
          totalCount
          items {
            ... on RtSimpleQueryRow {
              rtId
            }
            ckTypeId
            cells {
              totalCount
              items {
                attributePath
                value
              }
            }
          }
          pageInfo {
            hasNextPage
            endCursor
          }
        }
      }
    }
  }
}
