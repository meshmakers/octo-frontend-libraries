query getConfigurations(
  $after: String
  $first: Int
  $rtIds: [OctoObjectId]
  $searchFilter: SearchFilter
  $fieldFilters: [FieldFilter]
  $sort: [Sort]
) {
  runtime {
    systemConfiguration(
      after: $after
      first: $first
      rtIds: $rtIds
      searchFilter: $searchFilter
      fieldFilter: $fieldFilters
      sortOrder: $sort
    )  {
      totalCount

      items {
        rtId
        ckTypeId
        rtWellKnownName
      }
    }
  }
}
