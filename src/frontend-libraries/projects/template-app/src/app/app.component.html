<kendo-appbar position="top">
  <kendo-appbar-section>
    <button kendoButton fillMode="flat" (click)="drawer.toggle()">
      <kendo-svgicon [icon]="menuIcon"></kendo-svgicon>
    </button>
  </kendo-appbar-section>

  <kendo-appbar-section>
    <h1 class="title">{{ title }}</h1>
  </kendo-appbar-section>

  <kendo-appbar-spacer width="32px"></kendo-appbar-spacer>

  <kendo-appbar-section>
  </kendo-appbar-section>

  <kendo-appbar-spacer></kendo-appbar-spacer>

  <kendo-appbar-section>
    <span class="version-label">v{{ version }}</span>
  </kendo-appbar-section>

  <kendo-appbar-section>
    <mm-login-app-bar-section></mm-login-app-bar-section>
  </kendo-appbar-section>
</kendo-appbar>
<kendo-drawer-container>
  <kendo-drawer
    #drawer
    [items]="(commandService.drawerItems | async) ?? []"
    mode="push"
    [mini]="true"
    [expanded]="true"
    [isItemExpanded]="isItemExpanded"
    [autoCollapse]="false"
    (select)="onSelect($event)"
  >
  </kendo-drawer>
  <kendo-drawer-content>
    <div>
      <kendo-breadcrumb
        [items]="(breadCrumbService.breadCrumbItems | async) ?? []"
        (itemClick)="onBreadcrumbItemClick($event)"
      ></kendo-breadcrumb>
      <kendo-appbar-section>
        <kendo-menu [items]="(componentMenuService.menuItems | async) ?? []"
                    (select)="onSelectMenuItem($event)"></kendo-menu>
      </kendo-appbar-section>
    </div>

    <div class="octo-body">
      <router-outlet></router-outlet>
      <div kendoDialogContainer></div>
    </div>
  </kendo-drawer-content>
</kendo-drawer-container>
