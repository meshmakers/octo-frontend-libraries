overwrite: true
schema:
  - https://localhost:5001/tenants/paketService/graphQL:
      headers:
        Authorization: ${OCTO_GRAPHQL_AUTH_TOKEN}
documents: "projects/admin-panel/src/app/graphQL/*.graphql"
generates:
  projects/admin-panel/src/app/graphQL/globalTypes.ts:
    plugins:
      - typescript
    config:
      typesSuffix: Dto
      enumPrefix: false
  projects/admin-panel/src/app/graphQL/:
    preset: near-operation-file
    presetConfig:
      extension: .ts
      baseTypesPath: globalTypes.ts
    plugins:
      - "typescript-operations"
      - "typescript-apollo-angular"
    config:
      typesSuffix: Dto
