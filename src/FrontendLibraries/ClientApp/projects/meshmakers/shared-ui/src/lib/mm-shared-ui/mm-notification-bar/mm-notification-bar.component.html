<mat-toolbar [hidden]="!errorMessage" class="mm-notification-bar-background">
  <a (click)="onShowDetails()"><span class="mat-small"><u>{{ errorMessage?.title }}</u></span></a>

  <!-- This fills the remaining space of the current row -->
  <span class="notification-fill-remaining-space"></span>

  <button (click)="onHide()" class="mm-notification-bar-button" mat-fab><mat-icon>close</mat-icon></button>
</mat-toolbar>
