<mat-chip-grid #list>
  <mat-chip-row *ngFor="let entity of valuesFormControl.value"
                (removed)="remove(entity)"
                [editable]="false"
                [aria-description]="'press enter to edit ' + dataSource?.onDisplayEntity(entity) ?? null">
    {{dataSource?.onDisplayEntity(entity) ?? null}}
    <button matChipRemove [attr.aria-label]="'remove ' + dataSource?.onDisplayEntity(entity) ?? null">
      <mat-icon class="material-symbols-outlined">cancel</mat-icon>
    </button>
  </mat-chip-row>
  <input #input (blur)="onTouched()" (focusout)="onFocusOut()" [formControl]="searchFormControl"
         [matAutocomplete]="auto"
         [matChipInputFor]="list"
         matChipInputAddOnBlur="true"
         [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
         [placeholder]="placeholder" matInput>
  <mat-autocomplete #auto="matAutocomplete" (closed)="onEntityClosed()"
                    (optionActivated)="onEntityActivated($event)" (optionSelected)="onEntitySelected($event)"
                    [displayWith]="dataSource?.onDisplayEntity ?? null">
    <mat-option *ngIf="isLoading" class="is-loading">
      <mat-spinner diameter="50"></mat-spinner>
    </mat-option>
    <ng-container *ngIf="!isLoading">
      <mat-option *ngFor="let entity of filteredEntities" [value]="entity">
        {{dataSource?.onDisplayEntity(entity) ?? null}}
      </mat-option>
    </ng-container>
  </mat-autocomplete>
</mat-chip-grid>
