<mat-list class="mat-bread-crumb-list" *ngIf="breadcrumbData.length">
  <mat-list-item>
      <span class="mat-bread-crumb-spacer">
          <span *ngFor="let item of breadcrumbData; let i = index">
              <a *ngIf="item?.url" [routerLink]="item?.url"
                 class="mat-bread-crumb-list-item">{{ item.label }}</a>
              <span *ngIf="!item?.url" class="mat-bread-crumb-list-item">{{ item.label }}</span>
              <span *ngIf="breadcrumbData.length !== i+1" class="mat-bread-crumb-list-item">{{symbol}}</span>
          </span>
      </span>
  </mat-list-item>
</mat-list>
