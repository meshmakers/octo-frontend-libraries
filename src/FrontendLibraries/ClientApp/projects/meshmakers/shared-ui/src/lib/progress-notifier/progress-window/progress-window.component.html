<h1 mat-dialog-title>{{data.title}}</h1>
<div mat-dialog-content>
  <div fxLayout="column">
    <mat-progress-bar *ngIf="data.isDeterminate" [value]="progressValue" mode="determinate"></mat-progress-bar>
    <mat-progress-bar *ngIf="!data.isDeterminate" mode="indeterminate"></mat-progress-bar>
    <p>{{statusText}}</p>
  </div>
</div>
<div style="justify-content: flex-end;" mat-dialog-actions>
  <button (click)="onCancelClick()" *ngIf="data.isCancelOperationAvailable" mat-button>Cancel</button>
</div>
