parameters:
  - name: publishWorkingDirectory
    type: string
  - name: libName
    type: string

steps:
  - task: Npm@1
    condition: and(succeeded(), eq(variables.isRelease, true))
    displayName: npm publish to public registry ${{ parameters.libName }}
    inputs:
      command: 'custom'
      workingDir: ${{ parameters.publishWorkingDirectory }}
      verbose: false
      customEndpoint: $(NpmPublicConnection)
      customCommand: 'publish --tag $(BuildTagName) --access public'
  - task: Npm@1
    condition: and(succeeded(), or(eq(variables.isTest, true), and(eq(variables.isMain, true), eq(variables.isRelease, false))))
    displayName: npm publish to private registry ${{ parameters.libName }}
    inputs:
      command: 'custom'
      workingDir: ${{ parameters.publishWorkingDirectory }}
      verbose: false
      customEndpoint: $(NpmPrivateConnection)
      customCommand: 'publish --registry $(NpmPrivateUri) --tag $(BuildTagName)'
