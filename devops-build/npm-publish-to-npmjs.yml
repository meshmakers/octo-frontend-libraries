parameters:
  - name: npmCommand
    type: string
  - name: buildWorkingDirectory
    type: string
  - name: publishWorkingDirectory
    type: string    
  - name: libName
    type: string
  - name: isRelease
    type: boolean
    
steps:
  - task: Npm@1
    displayName: npm build ${{ parameters.libName }}
    inputs:
      command: custom
      workingDir: ${{ parameters.buildWorkingDirectory }}
      verbose: false
      customCommand: run ${{ parameters.npmCommand }} -- --configuration production
  - task: Npm@1
    condition: ${{ eq(parameters.isRelease, true) }}
    displayName: npm publish to public registry ${{ parameters.libName }}
    inputs:
      command: publish
      workingDir: ${{ parameters.publishWorkingDirectory }}
      verbose: false
      publishEndpoint: $(NpmPublicConnection)
  - task: Npm@1
    displayName: npm publish to private registry ${{ parameters.libName }}
    inputs:
      command: publish
      workingDir: ${{ parameters.publishWorkingDirectory }}
      verbose: false
      publishEndpoint: $(NpmPrivateConnection)      
    env:
      NODE_EXTRA_CA_CERTS: "/etc/ssl/certs/salzburgdev-ca.pem"