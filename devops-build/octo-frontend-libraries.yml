name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'
  
variables:
  - group: GitSSHGroup
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

pool:
  name: meshmakers-ci-agents

steps:
- template: update-build-number.yml
- template: set-version.yml
- task: Npm@1
  displayName: npm install
  inputs:
    workingDir: src/FrontendLibraries/ClientApp/
    verbose: false
# Build Tier 1 libraries (dependencies for legacy UI libs, not published from this pipeline)
- task: Npm@1
  displayName: npm build shared-services (build only, no publish)
  inputs:
    command: custom
    workingDir: src/FrontendLibraries/ClientApp/
    verbose: false
    customCommand: run build:shared-services -- --configuration production
- task: Npm@1
  displayName: npm build shared-auth (build only, no publish)
  inputs:
    command: custom
    workingDir: src/FrontendLibraries/ClientApp/
    verbose: false
    customCommand: run build:shared-auth -- --configuration production
- task: Npm@1
  displayName: npm build octo-services (build only, no publish)
  inputs:
    command: custom
    workingDir: src/FrontendLibraries/ClientApp/
    verbose: false
    customCommand: run build:octo-services -- --configuration production
# Build and publish legacy UI libraries
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: 'build:shared-ui-legacy'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/shared-ui-legacy'
    libName: 'shared-ui-legacy'
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: 'build:octo-ui-legacy'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/octo-ui-legacy'
    libName: 'octo-ui-legacy'
- template: handle-artifacts.yml