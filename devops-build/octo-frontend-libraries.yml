name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'
  
variables:
  - group: GitSSHGroup
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: artifactsFrameworkVersion
    value: 'net9.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

pool:
  name: meshmakers-ci-agents

steps:
- template: update-build-number.yml
- template: set-version.yml
- task: Npm@1
  displayName: npm install
  inputs:
    workingDir: src/FrontendLibraries/ClientApp/
    verbose: false
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: 'build:shared-services'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/shared-services'
    libName: 'shared-services'
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: 'build:shared-auth'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/shared-auth'
    libName: 'shared-auth'
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: ' build:shared-ui'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/shared-ui'
    libName: 'shared-ui'
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: ' build:octo-services'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/octo-services'
    libName: 'octo-services'
- template: npm-publish-to-npmjs.yml
  parameters:
    npmCommand: ' build:octo-ui'
    buildWorkingDirectory: 'src/FrontendLibraries/ClientApp/'
    publishWorkingDirectory: 'src/FrontendLibraries/ClientApp/dist/meshmakers/octo-ui'
    libName: 'octo-ui'
- template: handle-artifacts.yml