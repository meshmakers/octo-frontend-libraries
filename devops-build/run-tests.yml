steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '20.x'

  - task: CmdLine@2
    displayName: 'Install dependencies (frontend-libraries)'
    inputs:
      script: npm ci
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Build shared libraries (production)'
    inputs:
      script: |
        npm run build:shared-services -- --configuration production &&
        npm run build:shared-auth -- --configuration production &&
        npm run build:shared-ui -- --configuration production &&
        npm run build:shared-ui-legacy -- --configuration production &&
        npm run build:octo-services -- --configuration production &&
        npm run build:octo-ui -- --configuration production &&
        npm run build:octo-ui-legacy -- --configuration production &&
        npm run build:octo-process-diagrams -- --configuration production &&
        npm run build:octo-meshboard -- --configuration production
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Run unit tests (shared-auth)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/shared-auth --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish test results (shared-auth)'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries (shared-auth)'

  - task: CmdLine@2
    displayName: 'Run unit tests (shared-services)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/shared-services --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish test results (shared-services)'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries (shared-services)'

  - task: CmdLine@2
    displayName: 'Run unit tests (octo-services)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/octo-services --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish test results (octo-services)'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries (octo-services)'

  - task: CmdLine@2
    displayName: 'Run unit tests (octo-process-diagrams)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/octo-process-diagrams --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish test results (octo-process-diagrams)'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries (octo-process-diagrams)'

  - task: CmdLine@2
    displayName: 'Run unit tests (shared-ui)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/shared-ui --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish test results (shared-ui)'
    condition: succeededOrFailed()
