      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries (shared-ui)'

  - task: CmdLine@2
    displayName: 'Run unit tests (octo-meshboard)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=@meshmakers/octo-meshboard --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
