  - task: CmdLine@2
    displayName: 'Build template-app'
    inputs:
      script: npm run build:template-app
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Run unit tests (template-app)'
    inputs:
      script: NODE_OPTIONS="--max-old-space-size=6144" npm test -- --project=template-app --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
