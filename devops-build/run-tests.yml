steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '20.x'

  - task: CmdLine@2
    displayName: 'Install dependencies (frontend-libraries)'
    inputs:
      script: npm ci
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Lint all projects (parallel)'
    inputs:
      script: |
        set -e

        wait_all() {
          local fail=0
          for pid in "$@"; do
            wait "$pid" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "ERROR: One or more lint checks failed"
            exit 1
          fi
        }

        echo "=== Linting all projects in parallel ==="
        npx ng lint @meshmakers/shared-services &
        pid1=$!
        npx ng lint @meshmakers/shared-auth &
        pid2=$!
        npx ng lint @meshmakers/shared-ui &
        pid3=$!
        npx ng lint @meshmakers/shared-ui-legacy &
        pid4=$!
        npx ng lint @meshmakers/octo-services &
        pid5=$!
        npx ng lint @meshmakers/octo-ui &
        pid6=$!
        npx ng lint @meshmakers/octo-ui-legacy &
        pid7=$!
        npx ng lint @meshmakers/octo-process-diagrams &
        pid8=$!
        npx ng lint @meshmakers/octo-meshboard &
        pid9=$!
        npx ng lint demo-app &
        pid10=$!
        npx ng lint legacy-demo-app &
        pid11=$!
        wait_all $pid1 $pid2 $pid3 $pid4 $pid5 $pid6 $pid7 $pid8 $pid9 $pid10 $pid11

        echo "=== All lint checks passed ==="
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Build shared libraries (production, parallel tiers)'
    inputs:
      script: |
        set -e

        build_prod() {
          echo "Building $1..."
          npx ng build "@meshmakers/$1" --configuration production
        }

        wait_all() {
          local fail=0
          for pid in "$@"; do
            wait "$pid" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "ERROR: One or more parallel builds failed"
            exit 1
          fi
        }

        # Tier 0: No dependencies
        echo "=== Tier 0: shared-services ==="
        build_prod shared-services

        # Tier 1: Depends on shared-services (parallel)
        echo "=== Tier 1: shared-auth, shared-ui, shared-ui-legacy (parallel) ==="
        build_prod shared-auth &
        pid1=$!
        build_prod shared-ui &
        pid2=$!
        build_prod shared-ui-legacy &
        pid3=$!
        wait_all $pid1 $pid2 $pid3

        # Tier 2: Depends on shared-auth, shared-services
        echo "=== Tier 2: octo-services ==="
        build_prod octo-services

        # Tier 3: Depends on octo-services, shared-ui (parallel)
        echo "=== Tier 3: octo-ui, octo-ui-legacy, octo-process-diagrams (parallel) ==="
        build_prod octo-ui &
        pid4=$!
        build_prod octo-ui-legacy &
        pid5=$!
        build_prod octo-process-diagrams &
        pid6=$!
        wait_all $pid4 $pid5 $pid6

        # Tier 4: Depends on octo-ui, octo-process-diagrams
        echo "=== Tier 4: octo-meshboard ==="
        build_prod octo-meshboard

        echo "=== All libraries built successfully ==="
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries

  - task: CmdLine@2
    displayName: 'Run unit tests (parallel, 3 at a time)'
    inputs:
      script: |
        set -e
        export NODE_OPTIONS="--max-old-space-size=6144"

        run_test() {
          echo "Testing $1..."
          npm test -- --project="$1" --watch=false --browsers=ChromeHeadlessCI --reporters=junit,progress
        }

        wait_all() {
          local fail=0
          for pid in "$@"; do
            wait "$pid" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "ERROR: One or more tests failed"
            exit 1
          fi
        }

        # Round 1: octo-process-diagrams (slowest), shared-services, octo-services
        echo "=== Test Round 1 (3 parallel) ==="
        run_test @meshmakers/octo-process-diagrams &
        pid1=$!
        run_test @meshmakers/shared-services &
        pid2=$!
        run_test @meshmakers/octo-services &
        pid3=$!
        wait_all $pid1 $pid2 $pid3

        # Round 2: shared-auth, shared-ui, octo-meshboard
        echo "=== Test Round 2 (3 parallel) ==="
        run_test @meshmakers/shared-auth &
        pid4=$!
        run_test @meshmakers/shared-ui &
        pid5=$!
        run_test @meshmakers/octo-meshboard &
        pid6=$!
        wait_all $pid4 $pid5 $pid6

        echo "=== All library tests passed ==="
      workingDirectory: $(System.DefaultWorkingDirectory)/src/frontend-libraries
    continueOnError: false

  - task: PublishTestResults@2
    displayName: 'Publish all test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TESTS-*.xml'
      searchFolder: $(System.DefaultWorkingDirectory)/src/frontend-libraries
      mergeTestResults: true
      testRunTitle: 'Unit Tests - Frontend Libraries'
